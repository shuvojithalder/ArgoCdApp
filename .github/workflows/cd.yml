name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: |
          pip install -r requirements-dev.txt
          pytest

      - name: Set image name (lowercase for GHCR)
        id: image
        run: echo "name=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
        env:
          REGISTRY: ghcr.io

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.name }}:latest

      - name: Make GHCR package public
        run: |
          PKG=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')
          curl -sf -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/user/packages/container/${PKG}" \
            -d '{"visibility":"public"}' || true

      - name: Update deployment manifest
        run: |
          sed -i "s|image: ghcr.io/.*|image: ${{ steps.image.outputs.name }}:latest|" k8s/deployment.yaml

      - name: Commit manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --staged --quiet && exit 0
          git commit -m "chore(cd): update image to latest"
          git push
