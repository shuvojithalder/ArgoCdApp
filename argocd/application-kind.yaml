# Argo CD Application for Kind on EC2 (uses NodePort overlay).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/shuvojithalder/ArgoCdApp.git
    targetRevision: main
    path: k8s/overlays/kind
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  revisionHistoryLimit: 3
