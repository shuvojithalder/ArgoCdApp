# Use on EC2: kind create cluster --config kind/cluster-config.yaml
# Maps NodePort 30090 on the Kind node to EC2 host port 30090.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: argocd
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30090
        hostPort: 30090
        listenAddress: "0.0.0.0"
        protocol: TCP
